version: '3.8'

services:
  db:
    image: postgres:16
    container_name: mercato-db
    environment:
      POSTGRES_DB: mercato
      POSTGRES_USER: mercato
      POSTGRES_PASSWORD: mercato
    ports:
      - "5432:5432"
    volumes:
      - mercato_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mercato"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  mercato_data:
