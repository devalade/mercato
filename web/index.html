<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercato - Système de Gestion d'Inventaire</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .hero-bg {
            background-color: #6366f1;
        }
    </style>
    <meta http-equiv="refresh" content="0;url=./dashboard">
</head>
<body class="hero-bg min-h-screen">
    <div class="min-h-screen flex flex-col items-center justify-center p-4">
        <!-- Loading Spinner -->
        <div class="text-center">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-white/20 backdrop-blur rounded-2xl mb-6">
                <i class="fas fa-boxes text-4xl text-white"></i>
            </div>
            <h1 class="text-3xl font-bold text-white mb-2">Mercato</h1>
            <p class="text-white/80 mb-6">Système de Gestion d'Inventaire</p>
            <div class="flex items-center justify-center gap-2 text-white/60">
                <span class="loading loading-spinner loading-sm"></span>
                <span>Chargement...</span>
            </div>
        </div>
        
        <!-- Manual Navigation -->
        <div class="mt-8 text-center">
            <p class="text-white/60 text-sm mb-3">Redirection automatique en cours...</p>
            <a href="./login" class="btn btn-ghost text-white gap-2">
                <i class="fas fa-sign-in-alt"></i>
                Accéder à l'application
            </a>
        </div>
    </div>
    
    <script>
        // Fallback redirect after 3 seconds if meta refresh doesn't work
        setTimeout(function() {
            window.location.href = './dashboard';
        }, 3000);
    </script>
</body>
</html>
