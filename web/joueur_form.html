<!DOCTYPE html>
<html data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enregistrer un Joueur - Mercato</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .page-gradient {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
    </style>
</head>
<body class="page-gradient">
    <div class="min-h-screen flex items-center justify-center p-4">
        <div class="w-full max-w-lg">
            <!-- Header -->
            <div class="text-center mb-6">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-white/20 backdrop-blur rounded-xl mb-4">
                    <i class="fas fa-user-plus text-2xl text-white"></i>
                </div>
                <h1 class="text-2xl font-bold text-white">Enregistrer un Joueur</h1>
                <p class="text-white/80">Formulaire d'inscription joueur</p>
            </div>
            
            <!-- Form Card -->
            <div class="card bg-base-100 shadow-xl">
                <div class="card-body p-6">
                    <form method="post" action="api/form/joueur/new" class="space-y-5">
                        
                        <div class="form-control">
                            <label class="label">
                                <span class="label-text font-medium">Nom <span class="text-error">*</span></span>
                            </label>
                            <div class="relative">
                                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-base-content/40">
                                    <i class="fas fa-user"></i>
                                </span>
                                <input type="text" id="nom" name="nom" 
                                       class="input input-bordered w-full pl-10" 
                                       placeholder="Entrez le nom" required />
                            </div>
                        </div>
                        
                        <div class="form-control">
                            <label class="label">
                                <span class="label-text font-medium">Prénom <span class="text-error">*</span></span>
                            </label>
                            <div class="relative">
                                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-base-content/40">
                                    <i class="fas fa-user"></i>
                                </span>
                                <input type="text" id="prenom" name="prenom" 
                                       class="input input-bordered w-full pl-10" 
                                       placeholder="Entrez le prénom" required />
                            </div>
                        </div>
                        
                        <div class="form-control">
                            <label class="label">
                                <span class="label-text font-medium">Date de naissance <span class="text-error">*</span></span>
                            </label>
                            <div class="relative">
                                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-base-content/40">
                                    <i class="fas fa-calendar"></i>
                                </span>
                                <input type="date" id="dateNais" name="dateNais" 
                                       class="input input-bordered w-full pl-10" required />
                            </div>
                        </div>
                        
                        <div class="form-control">
                            <label class="label">
                                <span class="label-text font-medium">Poste <span class="text-error">*</span></span>
                            </label>
                            <div class="relative">
                                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-base-content/40">
                                    <i class="fas fa-futbol"></i>
                                </span>
                                <select id="poste" name="poste" class="select select-bordered w-full pl-10" required>
                                    <option value="">-- Choisir un poste --</option>
                                    <option value="GARDIEN">Gardien</option>
                                    <option value="DEFENSEUR">Défenseur</option>
                                    <option value="MILIEU">Milieu</option>
                                    <option value="ATTAQUANT">Attaquant</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="pt-2">
                            <button type="submit" class="btn btn-primary w-full gap-2">
                                <i class="fas fa-save"></i>
                                Enregistrer le Joueur
                            </button>
                        </div>
                    </form>
                </div>
            </div>
            
            <!-- Footer -->
            <div class="text-center mt-6 text-white/60 text-sm">
                <a href="dashboard" class="btn btn-ghost btn-sm text-white gap-2">
                    <i class="fas fa-arrow-left"></i>
                    Retour au Dashboard
                </a>
                <p class="mt-4">&copy; 2025 Mercato - Système de Gestion d'Inventaire</p>
            </div>
        </div>
    </div>
</body>
</html>
